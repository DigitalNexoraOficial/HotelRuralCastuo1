<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Hotel Castúo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 p-6">

    <div id="loginScreen">
        <h1 class="text-3xl font-bold text-center mb-8">Panel de Administración</h1>
        <input type="password" id="password" placeholder="Contraseña" class="w-full max-w-xs mx-auto block p-4 border rounded-2xl text-center">
        <button onclick="login()" class="mt-4 w-full max-w-xs mx-auto block bg-amber-800 text-white py-4 rounded-2xl">Entrar</button>
    </div>

    <div id="adminPanel" class="hidden">
        <h1 class="text-3xl font-bold mb-6">Reservas Recibidas</h1>
        <div id="reservasList" class="space-y-4"></div>
    </div>

    <script>
        const correctPassword = "castuo2026"; // Cambia esta contraseña

        function login() {
            if (document.getElementById('password').value === correctPassword) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadReservas();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        function loadReservas() {
            const reservas = JSON.parse(localStorage.getItem('reservas')) || [];
            const container = document.getElementById('reservasList');
            container.innerHTML = '';
            
            if (reservas.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500">No hay reservas aún.</p>';
                return;
            }

            reservas.forEach(r => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-3xl shadow";
                div.innerHTML = `
                    <p><strong>${r.nombre}</strong> - ${r.fecha}</p>
                    <p>${r.email} | ${r.telefono}</p>
                    <p class="text-sm text-gray-600 mt-2">${r.mensaje}</p>
                `;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
