<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Castúo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100">
    <div class="max-w-6xl mx-auto p-6">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-bold">Panel de Reservas</h1>
            <a href="index.html" class="text-amber-700 hover:underline">← Volver a la web</a>
        </div>

        <div id="reservasContainer" class="space-y-6">
            <!-- Las reservas aparecerán aquí -->
        </div>
    </div>

    <script>
        // Cargar reservas guardadas
        function cargarReservas() {
            const reservas = JSON.parse(localStorage.getItem('reservas')) || [];
            const container = document.getElementById('reservasContainer');
            container.innerHTML = '';

            if (reservas.length === 0) {
                container.innerHTML = `<p class="text-center text-stone-500 py-12">No hay reservas todavía.</p>`;
                return;
            }

            reservas.forEach((r, index) => {
                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-3xl shadow";
                card.innerHTML = `
                    <div class="flex justify-between">
                        <div>
                            <h3 class="font-semibold text-xl">${r.nombre}</h3>
                            <p class="text-stone-500">${r.email} • ${r.telefono}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-amber-700 font-medium">${r.checkin} → ${r.checkout}</p>
                            <p class="text-sm">${r.adultos} adultos ${r.ninos ? `· ${r.ninos} niños` : ''}</p>
                        </div>
                    </div>
                    <p class="mt-4 text-stone-600">${r.comentario || 'Sin comentarios'}</p>
                `;
                container.appendChild(card);
            });
        }

        cargarReservas();
    </script>
</body>
</html>
