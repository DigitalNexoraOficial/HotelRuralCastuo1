<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Hotel Castúo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-stone-100">
    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold">Panel de Administración</h1>
                <p class="text-stone-500">Hotel Rural Castúo</p>
            </div>
            <a href="index.html" class="flex items-center gap-2 text-amber-700 hover:underline">
                <i class="fas fa-home"></i> Volver a la web
            </a>
        </div>

        <div class="bg-white rounded-3xl shadow p-8">
            <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                <i class="fas fa-list"></i> Reservas Recibidas
            </h2>
            <div id="tabla" class="overflow-x-auto"></div>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient(
            'https://sushapqkyixbhpjemrbk.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1c2hhcHFreWl4YmhwamVtcmJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNDIyOTEsImV4cCI6MjA5OTcxODI5MX0.OX5mRhPNDEbKNpLVGZ_9R-x2SyVsJ5UISMc_8PLK73c'
        );

        async function cargarReservas() {
            const { data, error } = await supabase
                .from('reservas')
                .select('*')
                .order('created_at', { ascending: false });

            const container = document.getElementById('tabla');

            if (error) {
                container.innerHTML = `<p class="text-red-500">Error al cargar: ${error.message}</p>`;
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = `<p class="text-center py-12 text-stone-500">No hay reservas todavía.</p>`;
                return;
            }

            let html = `<table class="w-full min-w-full"><thead><tr class="border-b text-left">
                <th class="py-4">Cliente</th>
                <th class="py-4">Fechas</th>
                <th class="py-4">Contacto</th>
                <th class="py-4">Estado</th>
            </tr></thead><tbody>`;

            data.forEach(r => {
                html += `
                    <tr class="border-b hover:bg-stone-50">
                        <td class="py-5">
                            <div class="font-medium">${r.nombre}</div>
                        </td>
                        <td class="py-5">
                            ${r.checkin} → ${r.checkout}
                        </td>
                        <td class="py-5">
                            <div>${r.email}</div>
                            <div class="text-sm">${r.telefono}</div>
                        </td>
                        <td class="py-5">
                            <span class="px-4 py-1 rounded-full text-sm ${r.estado === 'Confirmada' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
                                ${r.estado || 'Pendiente'}
                            </span>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        // Cargar al abrir la página
        window.onload = cargarReservas;
    </script>
</body>
</html>
