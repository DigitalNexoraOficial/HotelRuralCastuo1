<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Rural Castúo · Reserva y gestión</title>
  <!-- Incluimos Supabase para poder guardar reservas -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --verde: #333f28; --verde-osc: #232b1a; --terracota: #a3603c;
      --crema: #f6f1e6; --crema-osc: #ece2cd; --texto: #3b352c;
      --borde: rgba(35,30,22,.14); --sombra: 0 20px 45px -20px rgba(32,27,22,.35);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--crema); color: var(--texto); line-height: 1.7; }
    .container { max-width: 1180px; margin: 0 auto; padding: 0 28px; }
    .btn { display: inline-flex; align-items: center; padding: 13px 22px; border-radius: 999px; font-weight: 600; cursor: pointer; border: none; transition: .25s; }
    .btn-primary { background: var(--terracota); color: white; }
    .topbar { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; background: rgba(246,241,230,.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--borde); }
    .brand { font-weight: 800; color: var(--verde); text-transform: uppercase; }
    .nav { display: flex; gap: 18px; }
    .hero { padding: 70px 0; background: linear-gradient(120deg, rgba(0,0,0,.18), rgba(0,0,0,.38)), url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1800&q=80') center/cover; color: white; min-height: 82vh; display: flex; align-items: center; }
    .hero-card { background: rgba(0,0,0,.35); padding: 36px; border-radius: 24px; max-width: 780px; }
    .section { padding: 78px 0; }
    .section.alt { background: var(--crema-osc); }
    .section-title { font-size: 2.2rem; margin-bottom: 24px; color: var(--verde-osc); }
    .grid { display: grid; gap: 22px; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .card { background: white; border: 1px solid var(--borde); border-radius: 18px; padding: 24px; box-shadow: var(--sombra); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    label { display: flex; flex-direction: column; gap: 6px; font-weight: 600; }
    input, select, textarea { padding: 11px; border: 1px solid var(--borde); border-radius: 10px; font: inherit; }
    .full { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#inicio">Hotel Rural Castúo</a>
    <nav class="nav">
      <a href="#inicio">Inicio</a>
      <a href="#habitaciones">Habitaciones</a>
      <a href="#reservar">Reservar</a>
    </nav>
  </header>

  <section id="inicio" class="hero">
    <div class="container">
      <div class="hero-card">
        <h1>Un refugio de piedra y calma.</h1>
        <p>Desconecta en el corazón de Las Hurdes.</p>
        <a class="btn btn-primary" href="#reservar">Reservar ahora</a>
      </div>
    </div>
  </section>

  <section id="habitaciones" class="section alt">
    <div class="container">
      <h2 class="section-title">Habitaciones</h2>
      <div class="grid grid-2">
        <div class="card"><h3>Habitación de piedra</h3><p>Atmósfera íntima y acogedora.</p></div>
        <div class="card"><h3>Habitación familiar</h3><p>Ideal para estancias en grupo.</p></div>
      </div>
    </div>
  </section>

  <section id="reservar" class="section">
    <div class="container">
      <div class="card">
        <h2 class="section-title">Solicita tu reserva</h2>
        <form id="formReserva">
          <div class="form-grid">
            <label>Nombre<input id="nombre" required /></label>
            <label>Email<input id="email" type="email" required /></label>
            <label>Fecha<input id="fecha" type="date" required /></label>
            <label>Personas<input id="personas" type="number" value="2" /></label>
            <label class="full">Mensaje<textarea id="mensaje"></textarea></label>
          </div>
          <br>
          <button class="btn btn-primary" type="submit">Enviar Reserva</button>
        </form>
      </div>
    </div>
  </section>

  <script>
    // Configura aquí tus claves de Supabase
    const supabase = supabase.createClient('TU_SUPABASE_URL', 'TU_SUPABASE_ANON_KEY');

    document.getElementById('formReserva').addEventListener('submit', async (e) => {
      e.preventDefault();
      const { error } = await supabase.from('reservas').insert([{
        nombre: document.getElementById('nombre').value,
        email: document.getElementById('email').value,
        fecha: document.getElementById('fecha').value,
        personas: document.getElementById('personas').value,
        mensaje: document.getElementById('mensaje').value,
        estado: 'Nueva'
      }]);

      if (error) alert("Error al reservar: " + error.message);
      else { alert("¡Reserva enviada con éxito!"); document.getElementById('formReserva').reset(); }
    });
  </script>
</body>
</html>
