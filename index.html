<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Rural Castúo - Pinofranqueado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-stone-50">

    <!-- BARRA SUPERIOR -->
    <div class="bg-white border-b">
        <div class="max-w-6xl mx-auto px-6 py-3 flex justify-between items-center text-sm">
            <div class="flex gap-6">
                <a href="tel:+34927674015" class="hover:text-amber-700">📞 +34 927 674 015</a>
                <a href="https://wa.me/346XXXXXXXX" target="_blank" class="hover:text-amber-700">💬 WhatsApp</a>
            </div>
            <div class="text-stone-500">Pinofranqueado, Las Hurdes</div>
        </div>
    </div>

    <!-- NAV -->
    <nav class="bg-white shadow sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-4xl">🌲</span>
                <h1 class="text-2xl font-bold">Hotel Castúo</h1>
            </div>
            <button onclick="openModal()" class="bg-amber-800 text-white px-8 py-3 rounded-2xl font-medium">
                Reservar
            </button>
        </div>
    </nav>

    <!-- HERO -->
    <section class="min-h-screen bg-cover bg-center flex items-center text-white" 
             style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('https://picsum.photos/id/1015/2000/1200');">
        <div class="max-w-4xl mx-auto text-center px-6">
            <h1 class="text-6xl font-light">Un refugio entre piedra y río</h1>
            <p class="mt-6 text-xl">Hotel rural en Pinofranqueado, Las Hurdes.</p>
            <button onclick="openModal()" class="mt-10 bg-white text-stone-900 px-10 py-4 rounded-2xl font-semibold">
                Reservar estancia
            </button>
        </div>
    </section>

    <!-- MODAL -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl w-full max-w-lg mx-4 p-8">
            <h2 class="text-3xl font-bold mb-6">Nueva Reserva</h2>
            <form id="form" class="space-y-5">
                <input id="nombre" placeholder="Nombre completo" required class="w-full p-4 border rounded-2xl">
                <input id="email" type="email" placeholder="Email" required class="w-full p-4 border rounded-2xl">
                <input id="telefono" placeholder="Teléfono" required class="w-full p-4 border rounded-2xl">
                <div class="grid grid-cols-2 gap-4">
                    <input id="checkin" type="date" required class="w-full p-4 border rounded-2xl">
                    <input id="checkout" type="date" required class="w-full p-4 border rounded-2xl">
                </div>
                <button type="submit" class="w-full py-5 bg-amber-800 text-white rounded-2xl font-semibold">Enviar Reserva</button>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-stone-900 text-white py-16 text-center">
        <p class="text-2xl font-bold">Hotel Rural Castúo</p>
        <p>Paseo Charco Morisco, 4 • 10630 Pinofranqueado, Cáceres</p>
        <p class="mt-6 text-sm opacity-70">© 2026 • H-CC-00656</p>
    </footer>

    <script>
        const supabase = supabase.createClient(
            'https://sushapqkyixbhpjemrbk.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1c2hhcHFreWl4YmhwamVtcmJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNDIyOTEsImV4cCI6MjA5OTcxODI5MX0.OX5mRhPNDEbKNpLVGZ_9R-x2SyVsJ5UISMc_8PLK73c'
        );

        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                checkin: document.getElementById('checkin').value,
                checkout: document.getElementById('checkout').value
            };

            const { error } = await supabase.from('reservas').insert([data]);
            if (error) alert('Error: ' + error.message);
            else alert('✅ Reserva enviada!');
            
            document.getElementById('modal').classList.add('hidden');
            e.target.reset();
        });

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
        }
    </script>
</body>
</html>
