<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Hotel Rural Castúo | Lujo en Las Hurdes</title>
</head>
<body>
    <nav>
        <h1>Hotel Rural Castúo</h1>
        <button onclick="window.location.href='login.html'">Admin</button>
    </nav>

    <main>
        <section class="hero">
            <h2>Bienvenidos al corazón de Las Hurdes</h2>
            <button class="btn-reserva" onclick="toggleModal()">Reservar Habitación</button>
        </section>
    </main>

    <!-- Modal de Reserva -->
    <div id="reservaModal" class="modal hidden">
        <div class="modal-content">
            <span onclick="toggleModal()" style="cursor:pointer">X</span>
            <h3>Solicitud de Reserva</h3>
            <input type="text" placeholder="Tu Nombre">
            <input type="date">
            <button>Confirmar Reserva</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Hotel Rural Castúo - Pinofranqueado. Todos los derechos reservados.</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
