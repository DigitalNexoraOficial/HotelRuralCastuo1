<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Rural Castúo - Pinofranqueado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-stone-50">

    <!-- NAV (igual que antes) -->
    <nav class="bg-white shadow sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🌲</span>
                <h1 class="text-2xl font-bold">Hotel Castúo</h1>
            </div>
            <div class="flex gap-6 text-sm font-medium">
                <a href="#habitaciones" class="hover:text-amber-700">Habitaciones</a>
                <a href="#galeria" class="hover:text-amber-700">Galería</a>
                <a href="#contacto" class="hover:text-amber-700">Contacto</a>
            </div>
            <button onclick="openReservaModal()" class="bg-amber-800 text-white px-6 py-3 rounded-xl font-medium">Reservar</button>
        </div>
    </nav>

    <!-- HERO (mantén el tuyo) -->

    <!-- MODAL DE RESERVA -->
    <div id="reservaModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl max-w-lg w-full mx-4 p-8">
            <h2 class="text-3xl font-bold mb-6">Reserva tu estancia</h2>
            <form id="reservaForm">
                <input type="text" id="nombre" placeholder="Nombre completo" class="w-full p-4 border rounded-2xl mb-4" required>
                <input type="email" id="email" placeholder="Email" class="w-full p-4 border rounded-2xl mb-4" required>
                <input type="tel" id="telefono" placeholder="Teléfono" class="w-full p-4 border rounded-2xl mb-4" required>
                <input type="date" id="fecha" class="w-full p-4 border rounded-2xl mb-4" required>
                <textarea id="mensaje" placeholder="Número de personas y comentarios..." class="w-full p-4 border rounded-2xl h-32"></textarea>
                
                <div class="flex gap-4 mt-8">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 border rounded-2xl">Cancelar</button>
                    <button type="submit" class="flex-1 py-4 bg-amber-800 text-white rounded-2xl">Enviar Reserva</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Abrir modal
        function openReservaModal() {
            document.getElementById('reservaModal').classList.remove('hidden');
        }
        function closeModal() {
            document.getElementById('reservaModal').classList.add('hidden');
        }

        // Enviar formulario
        document.getElementById('reservaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const reserva = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                fecha: document.getElementById('fecha').value,
                mensaje: document.getElementById('mensaje').value,
                fechaReserva: new Date().toLocaleString()
            };

            // Guardar localmente (para pruebas)
            let reservas = JSON.parse(localStorage.getItem('reservas')) || [];
            reservas.push(reserva);
            localStorage.setItem('reservas', JSON.stringify(reservas));

            alert('✅ Reserva enviada correctamente. Te contactaremos pronto.');
            closeModal();
            this.reset();
        });
    </script>
</body>
</html>
