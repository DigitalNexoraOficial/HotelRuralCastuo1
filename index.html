<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Rural Castúo</title>
<link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav><h1>Hotel Rural Castúo</h1><button onclick="showSection('admin')">Admin</button></nav>

    <main id="public">
        <section><h2>Bienvenidos a Las Hurdes</h2><p>Disfruta del río Los Ángeles.</p></section>
    </main>

    <main id="admin" class="hidden">
        <h2>Dashboard</h2>
        <form id="clientForm">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="text" id="habitacion" placeholder="Habitación">
            <button type="submit">Registrar</button>
        </form>
        <table id="clientTable">
            <thead><tr><th>Nombre</th><th>Hab.</th><th>Acciones</th></tr></thead>
            <tbody></tbody>
        </table>
    </main>
    <script src="app.js"></script>
</body>
</html>
