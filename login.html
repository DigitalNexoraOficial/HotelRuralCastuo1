<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Rural Castúo - Acceso Privado</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-gold: #c5a059;
            --bg-luxury: #faf8f5;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: rgba(197, 160, 89, 0.3);
        }

        body {
            background-color: var(--primary-color);
            background-image: linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.85)), 
                              url('https://github.com/DigitalNexoraOficial/HotelRuralCastuo1/blob/main/fondo-hero.png?raw=true');
            background-size: cover;
            background-position: center;
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(16px);
            padding: 3rem 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .auth-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ESTILO PARA EL LOGOTIPO OFICIAL EN EL LOGIN */
        .auth-logo-img {
            width: 75px;
            height: 75px;
            object-fit: contain;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            margin-bottom: 1rem;
        }

        .auth-header h2 {
            margin: 0;
            color: var(--primary-color);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            letter-spacing: 0.02em;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
            background: #f8fafc;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--accent-gold);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.15);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 0.5rem;
            box-shadow: 0 4px 15px rgba(15, 23, 42, 0.2);
        }

        .btn-submit:hover {
            background: var(--accent-gold);
            color: var(--primary-color);
            transform: translateY(-1px);
        }

        .perks-footer {
            display: flex;
            justify-content: space-around;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
            text-align: center;
        }

        .perk-item {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .perk-item i {
            color: var(--accent-gold);
            font-size: 1rem;
        }

        .msg-error { color: #dc2626; font-size: 0.85rem; margin-top: 0.75rem; text-align: center; font-weight: 500; }
        .msg-success { color: #16a34a; font-size: 0.85rem; margin-top: 0.75rem; text-align: center; font-weight: 500; }
        .back-home { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); text-decoration: none; font-weight: 500; }
        .back-home:hover { color: var(--accent-gold); }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-header">
            <img src="https://github.com/DigitalNexoraOficial/HotelRuralCastuo1/blob/main/Icon-web.png?raw=true" alt="Hotel Rural Castúo Logo" class="auth-logo-img">
            <h2>Hotel Rural Castúo</h2>
            <p>Acceso Privado & Área de Socios</p>
        </div>

        <form id="authForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <div class="input-with-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" required placeholder="tu@correo.com">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" required placeholder="••••••••" minlength="6">
                </div>
            </div>
            
            <button type="submit" class="btn-submit" id="submitBtn">Iniciar Sesión / Registrarse</button>
            <div id="authMessage"></div>
        </form>

        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Volver a la página principal</a>

        <div class="perks-footer">
            <div class="perk-item"><i class="fas fa-concierge-bell"></i><span>Atención 24/7</span></div>
            <div class="perk-item"><i class="fas fa-star"></i><span>Ventajas VIP</span></div>
            <div class="perk-item"><i class="fas fa-shield-alt"></i><span>Área Segura</span></div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const sb = createClient(
            'https://sushapqkyixbhpjemrbk.supabase.co',
            'sb_publishable_TSV_WRbLMBcXIxS9q7bx1Q_ego465L1'
        );

        const authForm = document.getElementById('authForm');
        const authMessage = document.getElementById('authMessage');

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            authMessage.innerHTML = `<p style="color: #64748b; text-align:center; font-size:0.85rem;">Procesando credenciales...</p>`;

            let { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error && error.message.includes('Invalid login credentials')) {
                const { data: signUpData, error: signUpError } = await sb.auth.signUp({ email, password });
                if (signUpError) {
                    authMessage.innerHTML = `<p class="msg-error">${signUpError.message}</p>`;
                    return;
                }
                data = signUpData;
            } else if (error) {
                authMessage.innerHTML = `<p class="msg-error">${error.message}</p>`;
                return;
            }

            if (data?.session || data?.user) {
                authMessage.innerHTML = `<p class="msg-success">¡Acceso concedido! Redirigiendo...</p>`;
                setTimeout(() => {
                    window.location.href = 'perfil.html';
                }, 1000);
            }
        });
    </script>
</body>
</html>
